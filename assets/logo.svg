<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b0f"/>
      <stop offset="100%" stop-color="#1a2e1f"/>
    </linearGradient>
    <linearGradient id="passLine" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="failLine" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#475569" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#475569" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle grid of dots -->
  <g fill="#1f2937" opacity="0.4">
    <circle cx="80" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="240" cy="80" r="2"/><circle cx="320" cy="80" r="2"/><circle cx="400" cy="80" r="2"/><circle cx="80" cy="160" r="2"/><circle cx="160" cy="160" r="2"/><circle cx="240" cy="160" r="2"/><circle cx="320" cy="160" r="2"/><circle cx="400" cy="160" r="2"/><circle cx="80" cy="240" r="2"/><circle cx="160" cy="240" r="2"/><circle cx="240" cy="240" r="2"/><circle cx="320" cy="240" r="2"/><circle cx="400" cy="240" r="2"/><circle cx="80" cy="320" r="2"/><circle cx="160" cy="320" r="2"/><circle cx="240" cy="320" r="2"/><circle cx="320" cy="320" r="2"/><circle cx="400" cy="320" r="2"/><circle cx="80" cy="400" r="2"/><circle cx="160" cy="400" r="2"/><circle cx="240" cy="400" r="2"/><circle cx="320" cy="400" r="2"/><circle cx="400" cy="400" r="2"/>
  </g>
  <!-- Two market-price lines diverging from a common origin -->
  <g fill="none" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- Fail branch: stays flat -->
    <path d="M 80 320 L 432 320" stroke="url(#failLine)"/>
    <!-- Pass branch: rises sharply -->
    <path d="M 80 320 C 180 320, 240 280, 432 130" stroke="url(#passLine)"/>
  </g>
  <!-- Endpoint markers -->
  <circle cx="80" cy="320" r="10" fill="#94a3b8"/>
  <circle cx="432" cy="320" r="12" fill="#475569"/>
  <circle cx="432" cy="130" r="14" fill="#10b981"/>
  <!-- Wordmark -->
  <text x="256" y="450" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="56" font-weight="700"
        fill="#e8e8ec" letter-spacing="6">FUTARCHY</text>
</svg>
